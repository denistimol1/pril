name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2

      - name: Generate Gradle Wrapper
        run: cd VpnApp && gradle wrapper --gradle-version 8.0

      - name: Make gradlew executable
        run: chmod +x ./VpnApp/gradlew

      - name: Build Debug APK
        run: cd VpnApp && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SafeVPN-debug
          path: VpnApp/app/build/outputs/apk/debug/app-debug.apk
